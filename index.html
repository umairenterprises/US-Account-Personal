<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal G - Live Sync</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; font-size: 1.2rem; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .btn { padding: 16px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 10px; margin: 8px 0; color: white; width: 100%; font-weight: bold; }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--success); }
        .btn-red { background: #e74c3c; }
        .input-field { width: 100%; padding: 14px; margin: 10px 0; font-size: 1.1rem; border: 2px solid #dcdde1; border-radius: 10px; box-sizing: border-box; }
        #login-screen, #main-menu, #add-record, #view-records, #settings { display: none; }
        .active { display: block !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="active">
        <h2 style="text-align:center">Jurnal G Login</h2>
        <input type="text" id="username" placeholder="Username" class="input-field">
        <input type="password" id="password" placeholder="Password" class="input-field">
        <button class="btn btn-blue" onclick="checkLogin()">Login</button>
    </div>

    <div id="main-menu">
        <h2 id="welcome-msg">Dashboard</h2>
        <button class="btn btn-blue" onclick="showScreen('add-record')">➕ Add New Record</button>
        <button class="btn btn-blue" onclick="showScreen('view-records')">📊 View Reports</button>
        <button class="btn btn-blue" onclick="showScreen('settings')">⚙️ Settings</button>
        <button class="btn btn-red" onclick="location.reload()">Logout</button>
    </div>

    <div id="settings">
        <button class="btn btn-red" style="width:auto" onclick="showScreen('main-menu')">← Back</button>
        <h3>Settings</h3>
        <input type="text" id="new-account" class="input-field" placeholder="Create Account Name">
        <button class="btn btn-green" onclick="saveAccount()">Save Account</button>
        <div id="acc-list" style="margin-top:20px;"></div>
    </div>

    <div id="add-record">
        <button class="btn btn-red" style="width:auto" onclick="showScreen('main-menu')">← Back</button>
        <h3>New Transaction</h3>
        <input type="text" id="date" class="input-field" placeholder="DD/MM/YY">
        <select id="acc-dropdown" class="input-field"></select>
        <input type="text" id="sub-acc" class="input-field" placeholder="Sub-Account">
        <input type="text" id="desc" class="input-field" placeholder="Description">
        <input type="number" id="debit" class="input-field" placeholder="Debit">
        <input type="number" id="credit" class="input-field" placeholder="Credit">
        <textarea id="narration" class="input-field" placeholder="Narration"></textarea>
        <input type="text" id="status" class="input-field" placeholder="Status">
        <button class="btn btn-green" onclick="saveEntry()">Save & Sync</button>
    </div>

    <div id="view-records">
        <button class="btn btn-red" style="width:auto" onclick="showScreen('main-menu')">← Back</button>
        <h3>Reports</h3>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-green" onclick="exportExcel()">Excel</button>
            <button class="btn btn-blue" onclick="exportPDF()">PDF (A4)</button>
        </div>
        <div style="overflow-x:auto;">
            <table id="myTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Date ⇅</th>
                        <th>Account</th>
                        <th>Dr</th>
                        <th>Cr</th>
                        <th>Ref</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- 1. FIREBASE INITIALIZATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyDDrN7x1Gppn9rqgMwf6mfUh6Q9x_X5fQA",
        authDomain: "umair-account-personal.firebaseapp.com",
        projectId: "umair-account-personal",
        storageBucket: "umair-account-personal.firebasestorage.app",
        messagingSenderId: "226753628780",
        appId: "1:226753628780:web:1e16215fdf948c3b602649",
        measurementId: "G-3XL4QJ8JQB"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let entries = [];
    let accounts = JSON.parse(localStorage.getItem('accounts')) || [];

    // Fetch Data from Firebase on Start
    db.collection("journal").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        entries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable();
    });

    // --- 2. AUTH ---
    function checkLogin() {
        if(document.getElementById('username').value === "Umair" && 
           document.getElementById('password').value === "3599181") {
            showScreen('main-menu');
        } else { alert("Ghalat Password!"); }
    }

    // --- 3. NAVIGATION ---
    function showScreen(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'add-record') prepareAdd();
        if(id === 'settings') renderAccList();
    }

    // --- 4. LOGIC ---
    function saveAccount() {
        const val = document.getElementById('new-account').value;
        if(val) {
            accounts.push(val);
            localStorage.setItem('accounts', JSON.stringify(accounts));
            document.getElementById('new-account').value = '';
            renderAccList();
            alert("Account Saved!");
        }
    }

    function renderAccList() {
        document.getElementById('acc-list').innerHTML = "<b>Current Accounts:</b> " + accounts.join(', ');
    }

    function prepareAdd() {
        const drop = document.getElementById('acc-dropdown');
        drop.innerHTML = accounts.map(a => `<option value="${a}">${a}</option>`).join('');
        let t = new Date();
        document.getElementById('date').value = `${String(t.getDate()).padStart(2,'0')}/${String(t.getMonth()+1).padStart(2,'0')}/${t.getFullYear().toString().slice(-2)}`;
    }

    async function saveEntry() {
        const entry = {
            date: document.getElementById('date').value,
            account: document.getElementById('acc-dropdown').value,
            sub: document.getElementById('sub-acc').value,
            debit: Number(document.getElementById('debit').value) || 0,
            credit: Number(document.getElementById('credit').value) || 0,
            ref: entries.length + 1,
            status: document.getElementById('status').value,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("journal").add(entry);
            alert("Sync Successful! Ref: " + entry.ref);
            showScreen('main-menu');
        } catch(e) {
            alert("Error: " + e.message);
        }
    }

    function renderTable() {
        const body = document.getElementById('table-body');
        body.innerHTML = entries.map(e => `
            <tr>
                <td>${e.date}</td>
                <td>${e.account}</td>
                <td>${e.debit}</td>
                <td>${e.credit}</td>
                <td>${e.ref}</td>
            </tr>
        `).join('');
    }

    // --- 5. EXPORTS ---
    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(entries);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Jurnal_Report.xlsx");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Journal G - Full Report", 14, 15);
        doc.autoTable({
            startY: 20,
            head: [['Date', 'Account', 'Dr', 'Cr', 'Ref']],
            body: entries.map(e => [e.date, e.account, e.debit, e.credit, e.ref])
        });
        doc.save("Report_A4.pdf");
    }

    function sortTable(n) {
        entries.sort((a, b) => (Object.values(a)[n] > Object.values(b)[n]) ? 1 : -1);
        renderTable();
    }
</script>
</body>
</html>
