<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal G - Professional App</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --font-main: 1.2rem;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-size: var(--font-main); 
            margin: 0; 
            padding: 20px; 
            background: #ecf0f1; 
        }

        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }

        .btn { 
            padding: 15px 25px; font-size: 1.2rem; cursor: pointer; border: none; 
            border-radius: 8px; margin: 5px; transition: 0.3s; color: white;
        }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .input-field { 
            width: 100%; padding: 15px; margin: 10px 0; font-size: 1.2rem; 
            border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box;
        }

        #login-screen, #main-menu, #add-record, #view-records, #settings { display: none; }
        .active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; cursor: pointer; }
        tr:nth-child(even) { background: #f9f9f9; }

        .filter-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="active">
        <center>
            <img src="https://cdn-icons-png.flaticon.com/512/1061/1061380.png" width="100">
            <h2>Jurnal G Login</h2>
            <input type="text" id="username" placeholder="Username" class="input-field">
            <input type="password" id="password" placeholder="Password" class="input-field">
            <button class="btn btn-blue" onclick="checkLogin()">Login</button>
        </center>
    </div>

    <div id="main-menu">
        <div class="nav-header">
            <h2>Dashboard</h2>
            <button class="btn btn-red" onclick="location.reload()">Logout</button>
        </div>
        <button class="btn btn-blue" style="width:100%" onclick="showScreen('add-record')">➕ Add New Record</button>
        <button class="btn btn-blue" style="width:100%" onclick="showScreen('view-records')">📊 View Reports & Records</button>
        <button class="btn btn-blue" style="width:100%" onclick="showScreen('settings')">⚙️ Account Settings</button>
    </div>

    <div id="settings">
        <button class="btn btn-red" onclick="showScreen('main-menu')">← Back</button>
        <h2>Account Settings</h2>
        <input type="text" id="new-account" class="input-field" placeholder="Enter New Account Name">
        <button class="btn btn-green" onclick="saveAccount()">Create Account</button>
        <hr>
        <h3>Available Accounts</h3>
        <div id="account-list" style="padding: 10px; background: #eee; border-radius: 5px;"></div>
    </div>

    <div id="add-record">
        <button class="btn btn-red" onclick="showScreen('main-menu')">← Back</button>
        <h2>Add Journal Entry</h2>
        <input type="text" id="date" class="input-field" placeholder="Date (DD/MM/YY)">
        <select id="acc-dropdown" class="input-field"><option>Loading Accounts...</option></select>
        <input type="text" id="sub-acc" class="input-field" placeholder="Sub-Account">
        <input type="text" id="desc" class="input-field" placeholder="Description">
        <input type="number" id="debit" class="input-field" placeholder="Debit Amount">
        <input type="number" id="credit" class="input-field" placeholder="Credit Amount">
        <textarea id="narration" class="input-field" placeholder="Narration (Auto Ref will be added)"></textarea>
        <input type="text" id="status" class="input-field" placeholder="Status">
        <button class="btn btn-green" style="width:100%" onclick="saveEntry()">Save Record</button>
    </div>

    <div id="view-records">
        <button class="btn btn-red" onclick="showScreen('main-menu')">← Back</button>
        <h2>Journal Reports</h2>
        
        <div class="filter-box">
            <input type="date" id="f-from"> to <input type="date" id="f-to">
            <select id="f-acc" style="padding:5px;"><option value="">All Accounts</option></select>
            <button class="btn btn-blue" style="padding:5px 15px;" onclick="applyFilters()">Filter</button>
        </div>

        <div style="margin-bottom: 15px;">
            <button class="btn btn-green" onclick="exportExcel()">Export Excel</button>
            <button class="btn btn-blue" onclick="exportPDF()">Export PDF (A4)</button>
            <button class="btn btn-blue" onclick="downloadTemplate()">Download Template</button>
            <input type="file" id="csv-import" style="display:none" onchange="importCSV(this)">
            <button class="btn btn-red" onclick="document.getElementById('csv-import').click()">Import CSV</button>
        </div>

        <div style="overflow-x:auto;">
            <table id="journal-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Date ⇅</th>
                        <th onclick="sortTable(1)">Account ⇅</th>
                        <th>Sub-Account</th>
                        <th>Debit</th>
                        <th>Credit</th>
                        <th>Ref</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    // Yahan apna Firebase config paste karein
    const firebaseConfig = {
        apiKey: "AIza...",
        authDomain: "your-app.firebaseapp.com",
        projectId: "your-app",
        storageBucket: "your-app.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    // Firebase Initialize (Optional: If not using Firebase, it works on LocalStorage)
    try // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDDrN7x1Gppn9rqgMwf6mfUh6Q9x_X5fQA",
  authDomain: "umair-account-personal.firebaseapp.com",
  projectId: "umair-account-personal",
  storageBucket: "umair-account-personal.firebasestorage.app",
  messagingSenderId: "226753628780",
  appId: "1:226753628780:web:1e16215fdf948c3b602649",
  measurementId: "G-3XL4QJ8JQB"
};

    // --- 3. NAVIGATION ---
    function showScreen(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'add-record' || id === 'view-records') updateUI();
    }

    // --- 4. LOGIC FUNCTIONS ---
    function saveAccount() {
        const name = document.getElementById('new-account').value;
        if(name) {
            accounts.push(name);
            localStorage.setItem('accounts', JSON.stringify(accounts));
            document.getElementById('new-account').value = '';
            alert("Account Created!");
            updateUI();
        }
    }

    function updateUI() {
        // Update Dropdowns
        const html = accounts.map(a => `<option value="${a}">${a}</option>`).join('');
        document.getElementById('acc-dropdown').innerHTML = html;
        document.getElementById('f-acc').innerHTML = `<option value="">All Accounts</option>` + html;
        document.getElementById('account-list').innerHTML = accounts.join(', ');
        
        // Update Table
        renderTable(entries);
        
        // Auto Date
        let today = new Date();
        let dd = String(today.getDate()).padStart(2, '0');
        let mm = String(today.getMonth() + 1).padStart(2, '0');
        let yy = today.getFullYear().toString().substr(-2);
        document.getElementById('date').value = `${dd}/${mm}/${yy}`;
    }

    function saveEntry() {
        const entry = {
            date: document.getElementById('date').value,
            account: document.getElementById('acc-dropdown').value,
            subAcc: document.getElementById('sub-acc').value,
            desc: document.getElementById('desc').value,
            debit: document.getElementById('debit').value || 0,
            credit: document.getElementById('credit').value || 0,
            ref: entries.length + 1,
            narration: document.getElementById('narration').value,
            status: document.getElementById('status').value,
            timestamp: new Date().getTime()
        };
        
        entries.push(entry);
        localStorage.setItem('entries', JSON.stringify(entries));
        alert("Record Saved! Ref: " + entry.ref);
        showScreen('main-menu');
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = data.map(e => `
            <tr>
                <td>${e.date}</td>
                <td>${e.account}</td>
                <td>${e.subAcc}</td>
                <td>${e.debit}</td>
                <td>${e.credit}</td>
                <td>${e.ref}</td>
                <td>${e.status}</td>
            </tr>
        `).join('');
    }

    // --- 5. IMPORT/EXPORT ---
    function downloadTemplate() {
        const head = "Date,Account,Sub-Account,Description,Debit,Credit,Ref,Narration,Status\nDD/MM/YY,,,,,,,,";
        const blob = new Blob([head], {type: 'text/csv'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'Jurnal_Template.csv';
        a.click();
    }

    function importCSV(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n').slice(1);
            rows.forEach(row => {
                const c = row.split(',');
                if(c[0]) {
                    entries.push({
                        date: c[0], account: c[1], subAcc: c[2], desc: c[3],
                        debit: c[4], credit: c[5], ref: c[6] || entries.length+1,
                        narration: c[7], status: c[8]
                    });
                }
            });
            localStorage.setItem('entries', JSON.stringify(entries));
            renderTable(entries);
            alert("Import Successful!");
        };
        reader.readAsText(file);
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(entries);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Journal");
        XLSX.writeFile(wb, "Journal_Report.xlsx");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        doc.text("Jurnal G - Report", 14, 15);
        doc.autoTable({
            head: [['Date', 'Account', 'Sub-Acc', 'Debit', 'Credit', 'Ref']],
            body: entries.map(e => [e.date, e.account, e.subAcc, e.debit, e.credit, e.ref]),
            startY: 20
        });
        doc.save("Journal_Report.pdf");
    }

    // --- 6. SEARCH & SORT ---
    function sortTable(n) {
        entries.sort((a, b) => {
            let valA = Object.values(a)[n];
            let valB = Object.values(b)[n];
            return valA > valB ? 1 : -1;
        });
        renderTable(entries);
    }
</script>

</body>
</html>
